services:
  - type: web
    name: my-blog
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: My Blog
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: public
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: my-blog-db
          property: connectionString
      - key: SEED_DATABASE
        value: "true"
      - key: MAIL_MAILER
        value: log

databases:
  - name: my-blog-db
    databaseName: my_blog
    user: my_blog_user
    plan: free
